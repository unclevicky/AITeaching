<h2>数字人视觉方案</h2>
<p class="subtitle">选择数字人的视觉表现形式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>全息投影风格</h3>
      <p>半透明蓝色全息质感，边缘发光，带有扫描线效果。科技感最强，符合"国赛Demo"的高端定位。使用 Lottie 动画 + CSS 滤镜叠加实现。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>写实医疗助手</h3>
      <p>穿白大褂的虚拟医生形象，面部表情动画。传递"医疗专业"的信任感。需要更精细的 Lottie 动画资源。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>极简几何机器人</h3>
      <p>抽象的几何形状组成的机器人形象，圆润可爱。Lottie 资源最容易获取，开发效率最高。</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top:2rem">
  <p class="subtitle" style="text-align:center">三种风格预览（Lottie 动画占位效果）</p>
  <div style="display:flex;gap:1.5rem;justify-content:center;margin-top:1rem">
    <div style="text-align:center">
      <div style="width:100px;height:120px;background:linear-gradient(180deg,rgba(0,100,200,0.1),rgba(0,50,100,0.2));border:1px solid rgba(0,180,255,0.3);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
        <div style="width:50px;height:50px;background:radial-gradient(circle,rgba(0,180,255,0.6),rgba(0,80,200,0.2));border-radius:50%;box-shadow:0 0 20px rgba(0,180,255,0.4),0 0 40px rgba(0,100,200,0.2)"></div>
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.5),transparent);animation:scan 2s linear infinite"></div>
      </div>
      <p style="font-size:12px;color:#00d4ff;margin-top:6px">全息投影</p>
    </div>
    <div style="text-align:center">
      <div style="width:100px;height:120px;background:linear-gradient(180deg,rgba(20,40,60,0.3),rgba(10,20,40,0.4));border:1px solid rgba(100,150,200,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center">
        <div style="width:40px;height:40px;background:radial-gradient(circle,#e8d5b5,#c4a87a);border-radius:50%;margin-bottom:20px;position:relative">
          <div style="position:absolute;top:12px;left:10px;width:4px;height:4px;background:#333;border-radius:50%"></div>
          <div style="position:absolute;top:12px;right:10px;width:4px;height:4px;background:#333;border-radius:50%"></div>
        </div>
      </div>
      <p style="font-size:12px;color:#8899aa;margin-top:6px">写实医生</p>
    </div>
    <div style="text-align:center">
      <div style="width:100px;height:120px;background:linear-gradient(180deg,rgba(20,40,60,0.3),rgba(10,20,40,0.4));border:1px solid rgba(100,150,200,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center">
        <div style="width:44px;height:36px;background:linear-gradient(135deg,#2a6aaa,#1a4a7a);border-radius:10px 10px 6px 6px;position:relative">
          <div style="position:absolute;top:8px;left:8px;width:8px;height:6px;background:#00d4ff;border-radius:2px"></div>
          <div style="position:absolute;top:8px;right:8px;width:8px;height:6px;background:#00d4ff;border-radius:2px"></div>
          <div style="position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:20px;height:12px;background:#1a4a7a;border-radius:4px"></div>
        </div>
      </div>
      <p style="font-size:12px;color:#8899aa;margin-top:6px">几何机器人</p>
    </div>
  </div>
</div>
