<h2>视觉风格方向</h2>
<p class="subtitle">选择你想要的整体视觉调性</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>深空蓝 · 医疗科技</h3>
      <p>深蓝/深青为主色调，配合青色(cyan)高亮。大量毛玻璃效果 + 微光边框。传递"精准、专业、高科技医疗"的感觉。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>暗夜紫 · 赛博未来</h3>
      <p>深紫/暗黑为主色调，配合紫色/品红高亮。霓虹光效 + 网格背景。更具科幻感和视觉冲击力。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>墨绿银 · 手术洁净</h3>
      <p>深墨绿/银灰为主色调，配合冰蓝高亮。极简线条 + 低饱和度。传递"洁净、精准、手术室级"的专业感。</p>
    </div>
  </div>
</div>

      <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(0,180,255,0.08),transparent 60%)"></div>
      <div style="width:60%;height:4px;background:linear-gradient(90deg,#00d4ff,#0066ff);border-radius:2px;margin-bottom:6px;position:relative"></div>
      <div style="width:40%;height:3px;background:rgba(0,180,255,0.3);border-radius:2px;margin-bottom:4px;position:relative"></div>
      <div style="width:50%;height:3px;background:rgba(0,180,255,0.2);border-radius:2px;position:relative"></div>
      <div style="position:absolute;right:6px;bottom:6px;font-size:10px;color:#00d4ff;opacity:0.6;position:relative">A</div>
    </div>
    <div style="width:160px;height:100px;background:linear-gradient(135deg,#0d041a,#1a0a2e,#2a0a40);border:1px solid #4a1a7a;border-radius:8px;padding:8px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 70% 30%,rgba(180,0,255,0.1),transparent 60%)"></div>
      <div style="width:60%;height:4px;background:linear-gradient(90deg,#ff00ff,#8800ff);border-radius:2px;margin-bottom:6px;position:relative"></div>
      <div style="width:40%;height:3px;background:rgba(180,0,255,0.3);border-radius:2px;margin-bottom:4px;position:relative"></div>
      <div style="width:50%;height:3px;background:rgba(180,0,255,0.2);border-radius:2px;position:relative"></div>
      <div style="position:absolute;right:6px;bottom:6px;font-size:10px;color:#ff00ff;opacity:0.6;position:relative">B</div>
    </div>
    <div style="width:160px;height:100px;background:linear-gradient(135deg,#060e0a,#0a1a10,#0a2a1a);border:1px solid #1a4a3a;border-radius:8px;padding:8px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 80%,rgba(0,200,150,0.06),transparent 60%)"></div>
      <div style="width:60%;height:4px;background:linear-gradient(90deg,#00ccaa,#88ccbb);border-radius:2px;margin-bottom:6px;position:relative"></div>
      <div style="width:40%;height:3px;background:rgba(0,200,150,0.25);border-radius:2px;margin-bottom:4px;position:relative"></div>
