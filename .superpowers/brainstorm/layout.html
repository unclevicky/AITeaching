<h2>整体布局方案</h2>
<p class="subtitle">选择你最喜欢的整体页面布局结构</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>左侧导航栏 (Side Nav)</h3>
      <p>深色玻璃拟态侧边栏固定在左侧，主内容区占据剩余空间。数字人悬浮在右下角。科技感强，类似控制面板。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>顶部导航栏 (Top Nav)</h3>
      <p>顶部玻璃拟态导航栏，主内容全宽展示。数字人悬浮在右下角。布局简洁，内容区域最大化。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>混合导航 (Hybrid)</h3>
      <p>左侧窄图标导航栏 + 顶部标题栏。兼顾功能入口和内容空间，适合功能较多的场景。</p>
    </div>
  </div>
</div>
